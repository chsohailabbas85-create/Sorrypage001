<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>I'm Sorry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>


<div class="card">


<div class="screen active">
<div class="emoji">🐰</div>
<h1>Hey lady </h1>
<p>Can we talk for a moment? There's something important I want to tell you.</p>
<button class="btn" onclick="nextScreen()">Continue ❤</button>
</div>


<div class="screen">
<h1>Little things I want to tell you…</h1>
<p>Tap each one</p>
<div class="choice" onclick="reveal(this)">❤</div>
<div class="choice" onclick="reveal(this)">❤</div>
<div class="choice" onclick="reveal(this)">❤</div>
<button class="btn" onclick="nextScreen()">My message →</button>
</div>


<div class="screen">
<h1>From my heart…</h1>
<p>↓ Tap to see message ↓</p>
<div class="choice final" onclick="nextScreen()">I'm Sorry</div>
</div>


<div class="screen">
<div class="letter">
<h1>I'm Sorry</h1>
<p id="typing"><span id="cursor">|</span></p>
</div>
</div>


</div>


<div class="watermark">sohail</div>


<script src="script.js"></script>
</body>
</html>
